<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>לוח מבחנים 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Suez+One&family=Assistant:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:         #F8EDD4;
      --card:       #FFFAEE;
      --border:     #D4A843;
      --text:       #2C1A00;
      --text-muted: #6B4510;
      --text-light: #9B7230;
      --gold:       #D4A017;
      --btn:        #C8860A;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--bg);
      background-image: url('background.png');
      background-size: cover;
      background-attachment: fixed;
      background-repeat: no-repeat;
      color: var(--text);
      font-family: 'Assistant', Arial, sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem;
      letter-spacing: 0.03em;
    }

    header { text-align: center; margin-bottom: 2.5rem; }

    .header-rule {
      border: none;
      border-top: 3px double var(--border);
      margin: 0.5rem auto;
      max-width: 500px;
    }

    header h1 {
      font-family: 'Suez One', serif;
      font-size: 2.6rem;
      color: var(--text);
      margin: 0.5rem 0;
      line-height: 1.2;
    }

    header p { color: var(--text-light); font-size: 0.88rem; }

    .legend {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.78rem;
      color: var(--text-muted);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.25rem 0.65rem;
    }

    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    .timeline { max-width: 700px; margin: 0 auto; position: relative; }

    .timeline::before {
      content: '';
      position: absolute;
      right: 24px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--border);
      opacity: 0.4;
    }

    .month-label {
      text-align: center;
      font-family: 'Suez One', serif;
      font-size: 1rem;
      color: var(--btn);
      margin: 2rem 0 1rem;
      letter-spacing: 1px;
    }

    .month-label::before, .month-label::after {
      content: '✦';
      color: var(--gold);
      margin: 0 0.6rem;
      font-size: 0.7rem;
    }

    .card {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      margin-bottom: 0.8rem;
      padding-right: 0.5rem;
    }

    .dot {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 17px;
      position: relative;
      z-index: 1;
      border: 2px solid var(--card);
      box-shadow: 0 0 0 2px currentColor;
    }

    .card-body {
      flex: 1;
      background: var(--card);
      border-radius: 4px;
      padding: 0.85rem 1.1rem;
      border: 1px solid var(--border);
      box-shadow: 2px 2px 0 #D4A84330;
      transition: transform 0.12s, box-shadow 0.12s;
    }

    .card-body:hover {
      transform: translateX(-3px);
      box-shadow: 4px 4px 0 #D4A84340;
    }

    .card-date {
      font-size: 0.72rem;
      color: var(--text-light);
      margin-bottom: 0.2rem;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.5;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 0.45rem;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .tags { display: flex; gap: 0.35rem; flex-wrap: wrap; }

    .tag {
      display: inline-block;
      font-size: 0.65rem;
      padding: 0.12rem 0.5rem;
      border-radius: 3px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    /* ===== כפתורי יומן ===== */
    .cal-buttons {
      display: flex;
      gap: 0.35rem;
      flex-shrink: 0;
    }

    .cal-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.22rem 0.55rem;
      border-radius: 4px;
      font-size: 0.65rem;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      border: 1px solid transparent;
      transition: opacity 0.15s, transform 0.1s;
      white-space: nowrap;
      font-family: 'Assistant', sans-serif;
    }

    .cal-btn:hover { opacity: 0.82; transform: translateY(-1px); }
    .cal-btn:active { transform: translateY(0); }

    .cal-btn-google {
      background: #fff;
      color: #444;
      border-color: #dadce0;
      box-shadow: 0 1px 3px #0001;
    }

    .cal-btn-apple {
      background: #1c1c1e;
      color: #fff;
      border-color: #333;
    }

    .cal-btn svg { flex-shrink: 0; }

    /* ===== קטגוריות ===== */
    .cat-bagrut    { color: #8B1A1A; }
    .cat-bagrut    .dot { background: #8B1A1A; color: #8B1A1A; }
    .cat-bagrut    .tag { background: #f9e8e8; color: #8B1A1A; border: 1px solid #c9a0a0; }

    .cat-metakonet { color: #1A4A8B; }
    .cat-metakonet .dot { background: #1A4A8B; color: #1A4A8B; }
    .cat-metakonet .tag { background: #e8eef9; color: #1A4A8B; border: 1px solid #9aaed4; }

    .cat-holiday   { color: #1A6B3A; }
    .cat-holiday   .dot { background: #1A6B3A; color: #1A6B3A; }
    .cat-holiday   .tag { background: #e8f5ee; color: #1A6B3A; border: 1px solid #8dc4a8; }

    .cat-gdna      { color: #7A4A00; }
    .cat-gdna      .dot { background: #B87000; color: #7A4A00; }
    .cat-gdna      .tag { background: #fdf3dc; color: #7A4A00; border: 1px solid var(--border); }

    .cat-bonus     { color: #4A1A8B; }
    .cat-bonus     .dot { background: #4A1A8B; color: #4A1A8B; }
    .cat-bonus     .tag { background: #eeebf9; color: #4A1A8B; border: 1px solid #b0a0d4; }

    .cat-special   { color: #8B1A5A; }
    .cat-special   .dot { background: #8B1A5A; color: #8B1A5A; }
    .cat-special   .tag { background: #f9e8f2; color: #8B1A5A; border: 1px solid #d0a0c0; }

    .tag-marathon  { background: #fdf3dc; color: #7A4A00; border: 1px solid var(--border); }

    footer {
      text-align: center;
      margin-top: 3rem;
      color: var(--text-light);
      font-size: 0.78rem;
    }

    @media (max-width: 480px) {
      header h1 { font-size: 1.9rem; }
      .cal-btn span { display: none; }
    }

    /* ===== כפתורי מיתוג תצוגה ===== */
    .view-toggle {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .view-btn {
      font-family: 'Assistant', sans-serif;
      font-size: 0.88rem;
      font-weight: 700;
      padding: 0.4rem 1.4rem;
      border-radius: 4px;
      border: 2px solid var(--border);
      background: var(--card);
      color: var(--text-muted);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      letter-spacing: 0.03em;
    }

    .view-btn.active,
    .view-btn:hover {
      background: var(--btn);
      color: #fff;
      border-color: var(--btn);
    }

    /* ===== לוח שנה ===== */
    #calendar {
      max-width: 700px;
      margin: 0 auto;
      display: none;
    }

    .cal-month {
      margin-bottom: 2.5rem;
    }

    .cal-month-title {
      text-align: center;
      font-family: 'Suez One', serif;
      font-size: 1rem;
      color: var(--btn);
      margin: 0 0 0.8rem;
      letter-spacing: 1px;
    }

    .cal-month-title::before,
    .cal-month-title::after {
      content: '✦';
      color: var(--gold);
      margin: 0 0.6rem;
      font-size: 0.7rem;
    }

    .cal-header-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
      margin-bottom: 3px;
    }

    .cal-day-name {
      text-align: center;
      font-size: 0.65rem;
      font-weight: 700;
      color: var(--text-light);
      padding: 0.25rem 0.1rem;
      background: var(--card);
      border-radius: 3px;
      border: 1px solid var(--border);
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
    }

    .cal-day {
      background: var(--card);
      border: 1px solid #D4A84350;
      border-radius: 4px;
      min-height: 64px;
      padding: 0.3rem 0.35rem;
    }

    .cal-day-empty {
      background: transparent;
      border: none;
      min-height: 64px;
    }

    .cal-day-num {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-muted);
      line-height: 1;
      margin-bottom: 3px;
    }

    .cal-day-today {
      border: 2px solid var(--gold);
    }

    .cal-day-today .cal-day-num {
      color: var(--btn);
      font-weight: 700;
    }

    .cal-cell-events {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .cal-cell-event {
      font-size: 0.6rem;
      font-weight: 700;
      color: #fff;
      padding: 1px 4px;
      border-radius: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      line-height: 1.5;
    }

    .cal-cell-event.cat-bagrut    { background: #8B1A1A; }
    .cal-cell-event.cat-metakonet { background: #1A4A8B; }
    .cal-cell-event.cat-holiday   { background: #1A6B3A; }
    .cal-cell-event.cat-gdna      { background: #B87000; }
    .cal-cell-event.cat-bonus     { background: #4A1A8B; }
    .cal-cell-event.cat-special   { background: #8B1A5A; }

    @media (max-width: 480px) {
      .cal-day-name { font-size: 0.55rem; }
      .cal-day { min-height: 52px; padding: 0.2rem; }
      .cal-day-num { font-size: 0.65rem; }
      .cal-cell-event { font-size: 0.52rem; }
    }
  </style>
</head>
<body>

  <header>
    <hr class="header-rule" />
    <h1>לוח מבחנים 2026</h1>
    <hr class="header-rule" />
    <p>עדכון אחרון: 09/04/2026 &nbsp;|&nbsp; תאריכים עד 21/05/2026</p>
  </header>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#8B1A1A"></div> בגרות רשמית</div>
    <div class="legend-item"><div class="legend-dot" style="background:#1A4A8B"></div> מתכונת</div>
    <div class="legend-item"><div class="legend-dot" style="background:#1A6B3A"></div> חופש / חג</div>
    <div class="legend-item"><div class="legend-dot" style="background:#B87000"></div> גדנ"ע</div>
    <div class="legend-item"><div class="legend-dot" style="background:#4A1A8B"></div> בונוס / מיוחד</div>
    <div class="legend-item"><div class="legend-dot" style="background:#8B1A5A"></div> אירוע אחר</div>
  </div>

  <div class="view-toggle">
    <button class="view-btn active" id="btn-timeline" onclick="setView('timeline')">ציר זמן</button>
    <button class="view-btn" id="btn-calendar" onclick="setView('calendar')">לוח שנה</button>
  </div>

  <div class="timeline" id="timeline"></div>

  <div id="calendar"></div>

  <footer>
    <hr class="header-rule" style="margin-bottom:0.75rem" />
    <p>עודכן לאחרונה: 09 אפריל 2026</p>
  </footer>

  <script>
    /* ===== נתוני אירועים ===== */
    const events = [
      {
        month: 'אפריל 2026',
        items: [
          { start: '20260414', end: '20260415', day: 'יום שלישי', display: '14/04/2026', title: 'מבחן בונוס מדעי המחשב', cat: 'bonus', tags: ['בונוס'] },
          { start: '20260415', end: '20260416', day: 'יום רביעי', display: '15/04/2026', title: 'מתכונת באנגלית', cat: 'metakonet', tags: ['מתכונת'] },
          { start: '20260420', end: '20260421', day: 'יום שני',   display: '20/04/2026', title: 'מתכונת ראשונה במתמטיקה', cat: 'metakonet', tags: ['מתכונת'] },
          { start: '20260422', end: '20260423', day: 'יום רביעי', display: '22/04/2026', title: 'יום העצמאות', cat: 'holiday', tags: ['חופש'] },
          { start: '20260423', end: '20260424', day: 'יום חמישי', display: '23/04/2026', title: 'מתכונת באנגלית ומתכונת בפיזיקה', cat: 'metakonet', tags: ['מתכונת'] },
          { start: '20260424', end: '20260501', day: '24–30',     display: '24/04 – 30/04/2026', title: 'שבוע גדנ"ע', cat: 'gdna', tags: ['גדנ"ע'] },
          { start: '20260430', end: '20260501', day: 'יום חמישי', display: '30/04/2026', title: 'בגרות ברוסית', cat: 'bagrut', tags: ['בגרות רשמית'] },
        ]
      },
      {
        month: 'מאי 2026',
        items: [
          { start: '20260504', end: '20260505', day: 'יום שני',   display: '04/05/2026', title: 'מתכונת שנייה במתמטיקה', cat: 'metakonet', tags: ['מתכונת'] },
          { start: '20260505', end: '20260506', day: 'יום שלישי', display: '05/05/2026', title: 'לג בעומר (חופש) – מרתון פיזיקה', cat: 'holiday', tags: ['חופש', 'מרתון'] },
          { start: '20260506', end: '20260507', day: 'יום רביעי', display: '06/05/2026', title: 'מתכונת באנגלית', cat: 'metakonet', tags: ['מתכונת'] },
          { start: '20260507', end: '20260508', day: 'יום חמישי', display: '07/05/2026', title: 'בגרות בלשון ומתכונת שיפור במתמטיקה', cat: 'bagrut', tags: ['בגרות רשמית'] },
          { start: '20260510', end: '20260511', day: 'יום ראשון', display: '10/05/2026', title: 'מתכונת שלישית במתמטיקה לניגשי לשון', cat: 'metakonet', tags: ['מתכונת'] },
          { start: '20260512', end: '20260513', day: 'יום שלישי', display: '12/05/2026', title: 'בגרות מתמטיקה 3 ו4 יח"ל', cat: 'bagrut', tags: ['בגרות רשמית'] },
          { start: '20260513', end: '20260514', day: 'יום רביעי', display: '13/05/2026', title: 'בגרות במתמטיקה יח"ל', cat: 'bagrut', tags: ['בגרות רשמית'] },
          { start: '20260514', end: '20260515', day: 'יום חמישי', display: '14/05/2026', title: 'צו ראשון', cat: 'special', tags: ['אירוע מיוחד'] },
          { start: '20260518', end: '20260519', day: 'יום שני',   display: '18/05/2026', title: 'בגרות באנגלית לרמות 3 ו5 יח"ל', cat: 'bagrut', tags: ['בגרות רשמית'] },
          { start: '20260519', end: '20260520', day: 'יום שלישי', display: '19/05/2026', title: 'בגרות באנגלית 4 יח"ל', cat: 'bagrut', tags: ['בגרות רשמית'] },
          { start: '20260520', end: '20260521', day: 'יום רביעי', display: '20/05/2026', title: 'מתכונת בניהול עסקי', cat: 'metakonet', tags: ['מתכונת'] },
          { start: '20260521', end: '20260522', day: 'יום חמישי', display: '21/05/2026', title: 'מתכונת בפיזיקה', cat: 'metakonet', tags: ['מתכונת'] },
        ]
      }
    ];

    /* ===== SVG לוגואים ===== */
    const googleSVG = `<svg width="14" height="14" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>`;

    const appleSVG = `<svg width="13" height="13" viewBox="0 0 814 1000" xmlns="http://www.w3.org/2000/svg">
      <path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-57.8-155.5-127.4C46 790.7 0 663 0 541.8c0-194.3 127.4-297.5 252.8-297.5 66.1 0 121.2 43.4 162.7 43.4 39.5 0 101.1-46 176.3-46 28.5 0 130.9 2.6 198.3 99.2zm-234-181.5c31.1-36.9 53.1-88.1 53.1-139.3 0-7.1-.6-14.3-1.9-20.1-50.6 1.9-110.8 33.7-147.1 75.8-28.5 32.4-55.1 83.6-55.1 135.5 0 7.8 1.3 15.6 1.9 18.1 3.2.6 8.4 1.3 13.6 1.3 45.4 0 102.5-30.4 135.5-71.3z" fill="white"/>
    </svg>`;

    /* ===== פונקציות ===== */
    function googleCalUrl(item) {
      const text = encodeURIComponent(item.title);
      return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${text}&dates=${item.start}/${item.end}`;
    }

    function downloadICS(item) {
      const uid = `exam-${item.start}-${Math.random().toString(36).slice(2)}@exam-schedule`;
      const ics = [
        'BEGIN:VCALENDAR',
        'VERSION:2.0',
        'CALSCALE:GREGORIAN',
        'PRODID:-//לוח מבחנים 2026//HE',
        'BEGIN:VEVENT',
        `UID:${uid}`,
        `DTSTART;VALUE=DATE:${item.start}`,
        `DTEND;VALUE=DATE:${item.end}`,
        `SUMMARY:${item.title}`,
        'END:VEVENT',
        'END:VCALENDAR'
      ].join('\r\n');

      const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${item.title.replace(/[^א-תa-z0-9]/gi, '_')}.ics`;
      a.click();
      URL.revokeObjectURL(url);
    }

    /* ===== בניית ה-DOM ===== */
    const timeline = document.getElementById('timeline');

    events.forEach(group => {
      const monthEl = document.createElement('div');
      monthEl.className = 'month-label';
      monthEl.textContent = group.month;
      timeline.appendChild(monthEl);

      group.items.forEach(item => {
        const card = document.createElement('div');
        card.className = `card cat-${item.cat}`;

        const tagsHTML = item.tags.map(t =>
          `<span class="tag${t === 'מרתון' ? ' tag-marathon' : ''}">${t}</span>`
        ).join('');

        card.innerHTML = `
          <div class="dot"></div>
          <div class="card-body">
            <div class="card-date">${item.day} &nbsp;|&nbsp; ${item.display}</div>
            <div class="card-title">${item.title}</div>
            <div class="card-footer">
              <div class="tags">${tagsHTML}</div>
              <div class="cal-buttons">
                <a class="cal-btn cal-btn-google" href="${googleCalUrl(item)}" target="_blank" rel="noopener" title="הוסף לגוגל קלנדר">
                  ${googleSVG}<span>Google</span>
                </a>
                <button class="cal-btn cal-btn-apple" title="הוסף ליומן אפל / Outlook">
                  ${appleSVG}<span>Apple</span>
                </button>
              </div>
            </div>
          </div>`;

        card.querySelector('.cal-btn-apple').addEventListener('click', () => downloadICS(item));
        timeline.appendChild(card);
      });
    });

    /* ===== לוח שנה ===== */
    function renderCalendar() {
      const calEl = document.getElementById('calendar');
      calEl.innerHTML = '';

      // בניית מפת אירועים לפי תאריך (כולל אירועים רב-יומיים)
      const eventsByDate = {};
      events.forEach(group => {
        group.items.forEach(item => {
          const sY = parseInt(item.start.slice(0, 4));
          const sM = parseInt(item.start.slice(4, 6)) - 1;
          const sD = parseInt(item.start.slice(6, 8));
          const eY = parseInt(item.end.slice(0, 4));
          const eM = parseInt(item.end.slice(4, 6)) - 1;
          const eD = parseInt(item.end.slice(6, 8));
          let cur = new Date(sY, sM, sD);
          const end = new Date(eY, eM, eD);
          while (cur < end) {
            const key = cur.getFullYear() +
              String(cur.getMonth() + 1).padStart(2, '0') +
              String(cur.getDate()).padStart(2, '0');
            if (!eventsByDate[key]) eventsByDate[key] = [];
            if (!eventsByDate[key].find(e => e.title === item.title)) {
              eventsByDate[key].push(item);
            }
            cur.setDate(cur.getDate() + 1);
          }
        });
      });

      // רינדור כל חודש
      events.forEach(group => {
        const first = group.items[0].start;
        const year  = parseInt(first.slice(0, 4));
        const month = parseInt(first.slice(4, 6)) - 1;
        renderMonth(calEl, year, month, eventsByDate, group.month);
      });
    }

    function renderMonth(container, year, month, eventsByDate, monthName) {
      const daysInMonth   = new Date(year, month + 1, 0).getDate();
      const firstDayOfWeek = new Date(year, month, 1).getDay(); // 0=ראשון
      const today         = new Date();

      const monthEl = document.createElement('div');
      monthEl.className = 'cal-month';

      // כותרת חודש
      const titleEl = document.createElement('div');
      titleEl.className = 'cal-month-title';
      titleEl.textContent = monthName;
      monthEl.appendChild(titleEl);

      // כותרות ימי שבוע
      const dayNames = ['ראשון', 'שני', 'שלישי', 'רביעי', 'חמישי', 'שישי', 'שבת'];
      const headerRow = document.createElement('div');
      headerRow.className = 'cal-header-row';
      dayNames.forEach(name => {
        const nameEl = document.createElement('div');
        nameEl.className = 'cal-day-name';
        nameEl.textContent = name;
        headerRow.appendChild(nameEl);
      });
      monthEl.appendChild(headerRow);

      // רשת ימים
      const gridEl = document.createElement('div');
      gridEl.className = 'cal-grid';

      // תאים ריקים לפני יום ראשון של החודש
      for (let i = 0; i < firstDayOfWeek; i++) {
        const empty = document.createElement('div');
        empty.className = 'cal-day-empty';
        gridEl.appendChild(empty);
      }

      // ימי החודש
      for (let d = 1; d <= daysInMonth; d++) {
        const dateKey = year +
          String(month + 1).padStart(2, '0') +
          String(d).padStart(2, '0');
        const dayEvents = eventsByDate[dateKey] || [];

        const dayEl = document.createElement('div');
        dayEl.className = 'cal-day';

        const isToday = today.getFullYear() === year &&
                        today.getMonth()    === month &&
                        today.getDate()     === d;
        if (isToday) dayEl.classList.add('cal-day-today');

        const numEl = document.createElement('div');
        numEl.className = 'cal-day-num';
        numEl.textContent = d;
        dayEl.appendChild(numEl);

        if (dayEvents.length > 0) {
          const eventsEl = document.createElement('div');
          eventsEl.className = 'cal-cell-events';
          dayEvents.forEach(ev => {
            const evEl = document.createElement('div');
            evEl.className = `cal-cell-event cat-${ev.cat}`;
            evEl.textContent = ev.title;
            evEl.title = ev.title;
            eventsEl.appendChild(evEl);
          });
          dayEl.appendChild(eventsEl);
        }

        gridEl.appendChild(dayEl);
      }

      monthEl.appendChild(gridEl);
      container.appendChild(monthEl);
    }

    /* ===== מיתוג בין תצוגות ===== */
    function setView(view) {
      const timelineEl = document.getElementById('timeline');
      const calendarEl = document.getElementById('calendar');
      const btnTimeline = document.getElementById('btn-timeline');
      const btnCalendar = document.getElementById('btn-calendar');

      if (view === 'timeline') {
        timelineEl.style.display = '';
        calendarEl.style.display = 'none';
        btnTimeline.classList.add('active');
        btnCalendar.classList.remove('active');
      } else {
        timelineEl.style.display = 'none';
        calendarEl.style.display = 'block';
        btnTimeline.classList.remove('active');
        btnCalendar.classList.add('active');
        renderCalendar();
      }
    }
  </script>
