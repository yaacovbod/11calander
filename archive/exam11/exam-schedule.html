<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>לוח מבחנים שכבת י"א נעימת הלב</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ===== Golden Hour Theme ===== */
    :root {
      --bg:         #F8EDD0;
      --card:       #FEF8EA;
      --border:     #D4A035;
      --text:       #3A2200;
      --text-muted: #6B4410;
      --text-light: #9B7020;
      --accent:     #B87800;
      --accent2:    #D4A030;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--bg);
      background-image:
        radial-gradient(ellipse at 15% 10%, #f0d08055 0%, transparent 45%),
        radial-gradient(ellipse at 85% 90%, #e8b84055 0%, transparent 45%);
      color: var(--text);
      font-family: 'Rubik', Arial, sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem;
      overflow-x: hidden;
    }

    /* ===== אלמנטים צפים ===== */
    .floaters {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .floater {
      position: absolute;
      bottom: -80px;
      font-size: 1.6rem;
      opacity: 0;
      animation: floatUp linear infinite;
      user-select: none;
    }

    @keyframes floatUp {
      0%   { transform: translateY(0)      rotate(-8deg)  scale(1);    opacity: 0;    }
      5%   { opacity: 0.22; }
      30%  { transform: translateY(-28vh)  rotate(6deg)   scale(1.05); opacity: 0.20; }
      60%  { transform: translateY(-58vh)  rotate(-5deg)  scale(0.97); opacity: 0.18; }
      90%  { transform: translateY(-90vh)  rotate(7deg)   scale(1.02); opacity: 0.12; }
      95%  { opacity: 0.04; }
      100% { transform: translateY(-108vh) rotate(-4deg)  scale(1);    opacity: 0;    }
    }

    /* ===== תוכן ===== */
    .content { position: relative; z-index: 1; }

    header { text-align: center; margin-bottom: 2.5rem; }

    .header-line {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
      margin: 0.5rem auto;
      max-width: 480px;
    }

    .header-line hr {
      flex: 1;
      border: none;
      border-top: 1.5px solid var(--border);
      opacity: 0.6;
    }

    .header-line span { color: var(--accent2); font-size: 0.9rem; }

    header h1 {
      font-family: 'Rubik', sans-serif;
      font-size: 3rem;
      font-weight: 700;
      color: var(--accent);
      margin: 0.4rem 0 0.2rem;
      letter-spacing: 1px;
      line-height: 1.1;
    }

    header p { color: var(--text-light); font-size: 0.88rem; }

    /* ===== מקרא ===== */
    .legend {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.78rem;
      color: var(--text-muted);
      background: var(--card);
      border: 1px solid #e0c080;
      border-radius: 20px;
      padding: 0.25rem 0.8rem;
    }

    .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

    /* ===== ציר זמן ===== */
    .timeline { max-width: 700px; margin: 0 auto; position: relative; }

    .timeline::before {
      content: '';
      position: absolute;
      right: 24px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: linear-gradient(to bottom, #D4A03566, #E8B84055);
    }

    .month-label {
      text-align: center;
      font-family: 'Rubik', sans-serif;
      font-size: 1.15rem;
      font-weight: 800;
      color: var(--accent);
      margin: 2rem 0 1rem;
      letter-spacing: 1px;
    }

    .month-label::before, .month-label::after {
      content: '✦';
      color: var(--accent2);
      margin: 0 0.6rem;
      font-size: 0.8rem;
    }

    /* ===== כרטיסייה ===== */
    .card {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      margin-bottom: 0.8rem;
      padding-right: 0.5rem;
    }

    .dot {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 17px;
      position: relative;
      z-index: 1;
      border: 2px solid var(--bg);
      box-shadow: 0 0 0 2px currentColor;
    }

    .card-body {
      flex: 1;
      background: var(--card);
      border-radius: 12px;
      padding: 0.85rem 1.15rem;
      border: 1px solid #e0c080;
      box-shadow: 0 2px 10px #d4a03518, 2px 3px 0 #e8c06055;
      transition: transform 0.12s, box-shadow 0.12s;
    }

    .card-body:hover {
      transform: translateX(-3px);
      box-shadow: 0 4px 18px #d4a03525, 4px 5px 0 #e8c06060;
    }

    .card-date {
      font-size: 0.72rem;
      color: var(--text-light);
      margin-bottom: 0.2rem;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .card-title {
      font-family: 'Rubik', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.45;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 0.45rem;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .tags { display: flex; gap: 0.35rem; flex-wrap: wrap; }

    .tag {
      display: inline-block;
      font-size: 0.65rem;
      padding: 0.12rem 0.6rem;
      border-radius: 20px;
      font-weight: 700;
      letter-spacing: 0.3px;
      font-family: 'Rubik', sans-serif;
    }

    /* ===== כפתורי יומן ===== */
    .cal-buttons { display: flex; gap: 0.35rem; flex-shrink: 0; }

    .cal-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.22rem 0.6rem;
      border-radius: 20px;
      font-size: 0.65rem;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      border: 1px solid transparent;
      transition: opacity 0.15s, transform 0.1s;
      white-space: nowrap;
      font-family: 'Rubik', sans-serif;
    }

    .cal-btn:hover { opacity: 0.82; transform: translateY(-1px); }
    .cal-btn:active { transform: translateY(0); }

    .cal-btn-google { background: #fff; color: #555; border-color: #e0c880; box-shadow: 0 1px 4px #d4a03515; }
    .cal-btn-apple  { background: #3A2200; color: #FEF8EA; border-color: #6B4410; }
    .cal-btn svg { flex-shrink: 0; }

    /* ===== קטגוריות Golden Hour ===== */
    .cat-bagrut    { color: #8B2200; }
    .cat-bagrut    .dot { background: #8B2200; color: #8B2200; }
    .cat-bagrut    .tag { background: #fceee8; color: #8B2200; border: 1px solid #d4a090; }

    .cat-metakonet { color: #1A4A6B; }
    .cat-metakonet .dot { background: #1A4A6B; color: #1A4A6B; }
    .cat-metakonet .tag { background: #e8f0f8; color: #1A4A6B; border: 1px solid #90b8d8; }

    .cat-holiday   { color: #2A6030; }
    .cat-holiday   .dot { background: #2A6030; color: #2A6030; }
    .cat-holiday   .tag { background: #eaf4ec; color: #2A6030; border: 1px solid #90c898; }

    .cat-gdna      { color: #7A5000; }
    .cat-gdna      .dot { background: #C88A00; color: #7A5000; }
    .cat-gdna      .tag { background: #fdf5d8; color: #7A5000; border: 1px solid #e0c050; }

    .cat-mivhan    { color: #1A7A6A; }
    .cat-mivhan    .dot { background: #1A7A6A; color: #1A7A6A; }
    .cat-mivhan    .tag { background: #e4f5f2; color: #1A7A6A; border: 1px solid #80c4b8; }

    .cat-army      { color: #3D4E1A; }
    .cat-army      .dot { background: #5A6B28; color: #3D4E1A; }
    .cat-army      .tag { background: #eaedda; color: #3D4E1A; border: 1px solid #8A9A50; }

    .cat-bonus     { color: #503080; }
    .cat-bonus     .dot { background: #503080; color: #503080; }
    .cat-bonus     .tag { background: #f0ecf8; color: #503080; border: 1px solid #b8a0d8; }

    .cat-special   { color: #7A3000; }
    .cat-special   .dot { background: #C06000; color: #7A3000; }
    .cat-special   .tag { background: #fdf0e0; color: #7A3000; border: 1px solid #e0b070; }

    .tag-marathon  { background: #fdf5d8; color: #7A5000; border: 1px solid #e0c050; }

    /* ===== טאבים ===== */
    .tabs-header {
      display: flex;
      gap: 0;
      margin-bottom: 0;
      border-bottom: 2px solid #e0c080;
    }

    .tab-btn {
      flex: 1;
      background: #f8edcc;
      border: 1px solid #e0c080;
      border-bottom: none;
      padding: 0.4rem 0.7rem;
      font-family: 'Rubik', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: 8px 8px 0 0;
      transition: background 0.15s, color 0.15s;
      text-align: center;
    }

    .tab-btn:first-child { margin-left: 3px; }

    .tab-btn.active {
      background: var(--card);
      color: var(--accent);
      border-bottom: 2px solid var(--card);
      margin-bottom: -2px;
      z-index: 1;
      position: relative;
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ===== כפתורי תצוגה ===== */
    .view-toggle {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 1.8rem;
    }

    .view-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 1.4rem;
      border-radius: 25px;
      font-family: 'Rubik', sans-serif;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      border: 2px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      transition: all 0.15s;
    }

    .view-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 2px 8px #b8780025;
    }

    .view-btn:not(.active):hover {
      background: var(--card);
      color: var(--accent);
    }

    /* ===== לוח שנה ===== */
    #calendar-view { display: none; max-width: 700px; margin: 0 auto; }

    .month-grid-wrap {
      margin-bottom: 2rem;
    }

    .month-grid-title {
      text-align: center;
      font-family: 'Rubik', sans-serif;
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--accent);
      margin-bottom: 0.75rem;
    }

    .month-grid-title::before, .month-grid-title::after {
      content: '✦';
      color: var(--accent2);
      margin: 0 0.5rem;
      font-size: 0.7rem;
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
    }

    .cal-day-name {
      text-align: center;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--text-light);
      padding: 0.3rem 0;
      background: var(--card);
      border-radius: 4px;
      border: 1px solid #e8d890;
    }

    .cal-cell {
      background: var(--card);
      border: 1px solid #e8d890;
      border-radius: 6px;
      padding: 0.3rem 0.25rem 0.25rem;
      min-height: 62px;
      position: relative;
      transition: box-shadow 0.1s;
    }

    .cal-cell.empty {
      background: transparent;
      border-color: transparent;
    }

    .cal-cell.has-event {
      border-color: var(--border);
      box-shadow: 0 1px 4px #d4a03520;
    }

    .cal-cell.wip {
      background: #f5f0e0;
      border-color: #ddd0a0;
      opacity: 0.7;
    }

    .cal-day-num {
      display: block;
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--text-muted);
      line-height: 1;
      margin-bottom: 0.2rem;
    }

    .cal-cell.has-event .cal-day-num { color: var(--text); }

    .cal-event-label {
      display: block;
      font-size: 0.6rem;
      font-weight: 700;
      line-height: 1.2;
      padding: 0.1rem 0.25rem;
      border-radius: 3px;
      margin-top: 0.15rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .cal-wip-label {
      display: block;
      font-size: 0.6rem;
      color: #a09060;
      text-align: center;
      margin-top: 0.2rem;
    }

    footer {
      text-align: center;
      margin-top: 3rem;
      color: var(--text-light);
      font-size: 0.78rem;
    }

    @media (max-width: 480px) {
      header h1 { font-size: 2.2rem; }
      .cal-btn span { display: none; }
      .cal-event-label { display: none; }
      .cal-cell { min-height: 40px; }
    }
  </style>
</head>
<body>

<!-- אלמנטים צפים -->
<div class="floaters" id="floaters"></div>

<div class="content">

  <header>
    <div class="header-line"><hr /><span>✿</span><hr /></div>
    <h1>לוח מבחנים שכבת י"א נעימת הלב</h1>
    <div class="header-line"><hr /><span>✿</span><hr /></div>
    <p>עדכון אחרון: 09/04/2026 &nbsp;|&nbsp; תאריכים עד 21/05/2026</p>
  </header>

  <div class="view-toggle">
    <button class="view-btn active" id="btn-events" onclick="setView('events')">📋 תצוגת אירועים</button>
    <button class="view-btn" id="btn-calendar" onclick="setView('calendar')">📅 תצוגת לוח שנה</button>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#8B2200"></div> בגרות רשמית</div>
    <div class="legend-item"><div class="legend-dot" style="background:#1A4A6B"></div> מתכונת</div>
    <div class="legend-item"><div class="legend-dot" style="background:#2A6030"></div> חופש / חג</div>
    <div class="legend-item"><div class="legend-dot" style="background:#1A7A6A"></div> מבחן</div>

    <div class="legend-item"><div class="legend-dot" style="background:#5A6B28"></div> הכנה לצה"ל</div>
  </div>

  <div id="events-view">
    <div class="timeline" id="timeline"></div>
  </div>

  <div id="calendar-view"></div>

  <footer>
    <div class="header-line" style="margin-bottom:0.75rem"><hr /><span>✿</span><hr /></div>
    <p>עודכן לאחרונה: 09 אפריל 2026</p>
  </footer>

</div>

<script>
  /* ===== אלמנטים צפים ===== */
  const schoolItems = [
    { icon: '✏️', size: '1.8rem' },
    { icon: '📚', size: '2rem'   },
    { icon: '📐', size: '1.7rem' },
    { icon: '📏', size: '1.6rem' },
    { icon: '🔬', size: '1.9rem' },
    { icon: '📓', size: '1.8rem' },
    { icon: '🖊️', size: '1.7rem' },
    { icon: '🧮', size: '1.8rem' },
    { icon: '⚗️', size: '1.7rem' },
    { icon: '🎒', size: '2rem'   },
    { icon: '📌', size: '1.5rem' },
    { icon: '💡', size: '1.7rem' },
    { icon: '✂️', size: '1.6rem' },
    { icon: '🖍️', size: '1.7rem' },
    { icon: '📎', size: '1.5rem' },
    { icon: '🔭', size: '1.8rem' },
    { icon: '📊', size: '1.7rem' },
    { icon: '📋', size: '1.8rem' },
    { icon: 'π',  size: '1.6rem', style: 'font-family:serif;font-weight:bold;color:#C88A00;opacity:0.5' },
    { icon: '∑',  size: '1.8rem', style: 'font-family:serif;font-weight:bold;color:#C88A00;opacity:0.5' },
    { icon: 'ABC', size: '1rem',  style: 'font-family:serif;font-weight:bold;color:#9B7020;letter-spacing:2px' },
    { icon: '∫',  size: '1.7rem', style: 'font-family:serif;font-weight:bold;color:#C88A00;opacity:0.5' },
    { icon: 'x²', size: '1.2rem', style: 'font-family:serif;font-weight:bold;color:#9B7020' },
    { icon: '✏️', size: '1.4rem' },
    { icon: '📚', size: '1.6rem' },
    { icon: '📐', size: '1.9rem' },
    { icon: '🔬', size: '1.5rem' },
    { icon: '🎒', size: '1.7rem' },
    { icon: '💡', size: '2rem'   },
  ];

  const container = document.getElementById('floaters');

  schoolItems.forEach((item, i) => {
    const el = document.createElement('span');
    el.className = 'floater';
    el.textContent = item.icon;

    const leftPct  = 3 + (i * 97 / schoolItems.length) + (Math.random() * 3 - 1.5);
    const duration = 12 + Math.random() * 14;   // 12–26s
    const delay    = -(Math.random() * duration); // already mid-air at load

    el.style.left            = `${leftPct.toFixed(1)}%`;
    el.style.fontSize        = item.size;
    el.style.animationDuration  = `${duration.toFixed(1)}s`;
    el.style.animationDelay     = `${delay.toFixed(1)}s`;
    if (item.style) el.style.cssText += item.style;

    container.appendChild(el);
  });

  /* ===== לוגו בית הספר צף ===== */
  const logoPositions = [8, 28, 50, 72, 90];
  logoPositions.forEach((left, i) => {
    const img = document.createElement('img');
    img.src = 'neimat.png';
    img.className = 'floater';
    img.style.left   = `${left}%`;
    img.style.width  = `${38 + (i % 3) * 10}px`;
    img.style.fontSize = '0';
    const duration = 16 + i * 3.5;
    const delay    = -(Math.random() * duration);
    img.style.animationDuration = `${duration.toFixed(1)}s`;
    img.style.animationDelay    = `${delay.toFixed(1)}s`;
    img.style.opacity = '0';
    img.style.filter  = 'drop-shadow(0 2px 4px #d4a03530)';
    container.appendChild(img);
  });

  /* ===== נתוני אירועים ===== */
  // כל item יכול להכיל מערך events לתמיכה בטאבים
  const events = [
    {
      month: 'אפריל 2026',
      items: [
        { start: '20260414', end: '20260415', day: 'יום שלישי', display: '14/04/2026', events: [
            { title: 'מבחן בונוס מדעי המחשב', cat: 'mivhan', tags: ['מבחן'] }
        ]},
        { start: '20260415', end: '20260416', day: 'יום רביעי', display: '15/04/2026', events: [
            { title: 'מתכונת באנגלית', cat: 'metakonet', tags: ['מתכונת'] }
        ]},
        { start: '20260420', end: '20260421', day: 'יום שני', display: '20/04/2026', events: [
            { title: 'מתכונת ראשונה במתמטיקה', cat: 'metakonet', tags: ['מתכונת'] }
        ]},
        { start: '20260422', end: '20260423', day: 'יום רביעי', display: '22/04/2026', events: [
            { title: 'יום העצמאות', cat: 'holiday', tags: ['חופש'] }
        ]},
        { start: '20260423', end: '20260424', day: 'יום חמישי', display: '23/04/2026', events: [
            { title: 'מתכונת באנגלית', cat: 'metakonet', tags: ['מתכונת'] },
            { title: 'מתכונת בפיזיקה',  cat: 'metakonet', tags: ['מתכונת'] }
        ]},
        { start: '20260424', end: '20260501', day: '24–30', display: '24/04 – 30/04/2026', events: [
            { title: 'שבוע גדנ"ע', cat: 'army', tags: ['הכנה לצה"ל'] }
        ]},
        { start: '20260430', end: '20260501', day: 'יום חמישי', display: '30/04/2026', events: [
            { title: 'בגרות ברוסית', cat: 'bagrut', tags: ['בגרות רשמית'] }
        ]},
      ]
    },
    {
      month: 'מאי 2026',
      items: [
        { start: '20260504', end: '20260505', day: 'יום שני', display: '04/05/2026', events: [
            { title: 'מתכונת שנייה במתמטיקה', cat: 'metakonet', tags: ['מתכונת'] }
        ]},
        { start: '20260505', end: '20260506', day: 'יום שלישי', display: '05/05/2026', events: [
            { title: 'לג בעומר (חופש) – מרתון פיזיקה', cat: 'holiday', tags: ['חופש', 'מרתון'] }
        ]},
        { start: '20260506', end: '20260507', day: 'יום רביעי', display: '06/05/2026', events: [
            { title: 'מתכונת באנגלית', cat: 'metakonet', tags: ['מתכונת'] }
        ]},
        { start: '20260507', end: '20260508', day: 'יום חמישי', display: '07/05/2026', events: [
            { title: 'בגרות בלשון',               cat: 'bagrut',    tags: ['בגרות רשמית'] },
            { title: 'מתכונת שיפור במתמטיקה', cat: 'metakonet', tags: ['מתכונת'] }
        ]},
        { start: '20260510', end: '20260511', day: 'יום ראשון', display: '10/05/2026', events: [
            { title: 'מתכונת שיפור במתמטיקה לניגשי לשון', cat: 'metakonet', tags: ['מתכונת'] }
        ]},
        { start: '20260512', end: '20260513', day: 'יום שלישי', display: '12/05/2026', events: [
            { title: 'בגרות מתמטיקה 3 ו4 יח"ל', cat: 'bagrut', tags: ['בגרות רשמית'] }
        ]},
        { start: '20260513', end: '20260514', day: 'יום רביעי', display: '13/05/2026', events: [
            { title: 'בגרות במתמטיקה יח"ל', cat: 'bagrut', tags: ['בגרות רשמית'] }
        ]},
        { start: '20260514', end: '20260515', day: 'יום חמישי', display: '14/05/2026', events: [
            { title: 'צו ראשון', cat: 'army', tags: ['הכנה לצה"ל'] }
        ]},
        { start: '20260518', end: '20260519', day: 'יום שני', display: '18/05/2026', events: [
            { title: 'בגרות באנגלית לרמות 3 ו5 יח"ל', cat: 'bagrut', tags: ['בגרות רשמית'] }
        ]},
        { start: '20260519', end: '20260520', day: 'יום שלישי', display: '19/05/2026', events: [
            { title: 'בגרות באנגלית 4 יח"ל', cat: 'bagrut', tags: ['בגרות רשמית'] }
        ]},
        { start: '20260520', end: '20260521', day: 'יום רביעי', display: '20/05/2026', events: [
            { title: 'מתכונת בניהול עסקי', cat: 'metakonet', tags: ['מתכונת'] }
        ]},
        { start: '20260521', end: '20260522', day: 'יום חמישי', display: '21/05/2026', events: [
            { title: 'מתכונת בפיזיקה', cat: 'metakonet', tags: ['מתכונת'] }
        ]},
      ]
    }
  ];

  /* ===== SVG לוגואים ===== */
  const googleSVG = `<svg width="14" height="14" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
  </svg>`;

  const appleSVG = `<svg width="13" height="13" viewBox="0 0 814 1000" xmlns="http://www.w3.org/2000/svg">
    <path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-57.8-155.5-127.4C46 790.7 0 663 0 541.8c0-194.3 127.4-297.5 252.8-297.5 66.1 0 121.2 43.4 162.7 43.4 39.5 0 101.1-46 176.3-46 28.5 0 130.9 2.6 198.3 99.2zm-234-181.5c31.1-36.9 53.1-88.1 53.1-139.3 0-7.1-.6-14.3-1.9-20.1-50.6 1.9-110.8 33.7-147.1 75.8-28.5 32.4-55.1 83.6-55.1 135.5 0 7.8 1.3 15.6 1.9 18.1 3.2.6 8.4 1.3 13.6 1.3 45.4 0 102.5-30.4 135.5-71.3z" fill="white"/>
  </svg>`;

  function googleCalUrl(item) {
    return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(item.title)}&dates=${item.start}/${item.end}`;
  }

  function downloadICS(item) {
    const uid = `exam-${item.start}-${Math.random().toString(36).slice(2)}@exam-schedule`;
    const ics = [
      'BEGIN:VCALENDAR', 'VERSION:2.0', 'CALSCALE:GREGORIAN',
      'PRODID:-//לוח מבחנים 2026//HE', 'BEGIN:VEVENT',
      `UID:${uid}`,
      `DTSTART;VALUE=DATE:${item.start}`,
      `DTEND;VALUE=DATE:${item.end}`,
      `SUMMARY:${item.title}`,
      'END:VEVENT', 'END:VCALENDAR'
    ].join('\r\n');
    const a = Object.assign(document.createElement('a'), {
      href: URL.createObjectURL(new Blob([ics], { type: 'text/calendar;charset=utf-8' })),
      download: `${item.title.replace(/[^א-תa-z0-9]/gi, '_')}.ics`
    });
    a.click();
    URL.revokeObjectURL(a.href);
  }

  /* ===== בניית ה-DOM ===== */
  const timeline = document.getElementById('timeline');

  events.forEach(group => {
    const monthEl = document.createElement('div');
    monthEl.className = 'month-label';
    monthEl.textContent = group.month;
    timeline.appendChild(monthEl);

    group.items.forEach(item => {
      const isMulti = item.events.length > 1;
      const firstCat = item.events[0].cat;

      const card = document.createElement('div');
      card.className = `card cat-${firstCat}`;

      if (!isMulti) {
        // כרטיסייה רגילה
        const ev = item.events[0];
        const tagsHTML = ev.tags.map(t =>
          `<span class="tag${t === 'מרתון' ? ' tag-marathon' : ''}">${t}</span>`
        ).join('');

        card.innerHTML = `
          <div class="dot"></div>
          <div class="card-body">
            <div class="card-date">${item.day} &nbsp;|&nbsp; ${item.display}</div>
            <div class="card-title">${ev.title}</div>
            <div class="card-footer">
              <div class="tags">${tagsHTML}</div>
              <div class="cal-buttons">
                <a class="cal-btn cal-btn-google" href="${googleCalUrl({...item, title: ev.title})}" target="_blank" rel="noopener">${googleSVG}<span>Google</span></a>
                <button class="cal-btn cal-btn-apple">${appleSVG}<span>Apple</span></button>
              </div>
            </div>
          </div>`;

        card.querySelector('.cal-btn-apple').addEventListener('click', () =>
          downloadICS({...item, title: ev.title})
        );

      } else {
        // כרטיסייה עם טאבים
        const tabsHeaderHTML = item.events.map((ev, i) =>
          `<button class="tab-btn${i === 0 ? ' active' : ''}" data-tab="${i}">${ev.title}</button>`
        ).join('');

        const panelsHTML = item.events.map((ev, i) => {
          const tagsHTML = ev.tags.map(t =>
            `<span class="tag${t === 'מרתון' ? ' tag-marathon' : ''}">${t}</span>`
          ).join('');
          return `
            <div class="tab-panel cat-${ev.cat}${i === 0 ? ' active' : ''}" data-panel="${i}">
              <div class="card-title" style="margin-top:0.5rem">${ev.title}</div>
              <div class="card-footer">
                <div class="tags">${tagsHTML}</div>
                <div class="cal-buttons">
                  <a class="cal-btn cal-btn-google" href="${googleCalUrl({...item, title: ev.title})}" target="_blank" rel="noopener">${googleSVG}<span>Google</span></a>
                  <button class="cal-btn cal-btn-apple" data-ev="${i}">${appleSVG}<span>Apple</span></button>
                </div>
              </div>
            </div>`;
        }).join('');

        card.innerHTML = `
          <div class="dot"></div>
          <div class="card-body">
            <div class="card-date">${item.day} &nbsp;|&nbsp; ${item.display}</div>
            <div class="tabs-header">${tabsHeaderHTML}</div>
            ${panelsHTML}
          </div>`;

        // אירועי טאב
        card.querySelectorAll('.tab-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const idx = btn.dataset.tab;
            card.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            card.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            btn.classList.add('active');
            card.querySelector(`.tab-panel[data-panel="${idx}"]`).classList.add('active');
            // עדכון צבע הנקודה
            const activeCat = item.events[idx].cat;
            card.className = `card cat-${activeCat}`;
          });
        });

        // הורדת ICS לפי טאב
        card.querySelectorAll('.cal-btn-apple').forEach(btn => {
          btn.addEventListener('click', () => {
            const idx = parseInt(btn.dataset.ev);
            downloadICS({...item, title: item.events[idx].title});
          });
        });
      }

      timeline.appendChild(card);
    });
  });

  /* ===== מפת אירועים לפי תאריך ===== */
  const eventMap = {};
  events.forEach(group => {
    group.items.forEach(item => {
      const key = item.start;
      if (!eventMap[key]) eventMap[key] = [];
      item.events.forEach(ev => eventMap[key].push({ ...ev, title: ev.title }));
    });
  });

  /* ===== בניית לוח שנה ===== */
  const CUTOFF = new Date(2026, 4, 21); // 21/05/2026
  const monthNames = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
  const dayNames   = ['א׳','ב׳','ג׳','ד׳','ה׳','ו׳','ש׳']; // Sun–Sat

  // צבעי קטגוריה לתוויות בלוח
  const catColors = {
    bagrut:    { bg: '#fceee8', color: '#8B2200', border: '#d4a090' },
    metakonet: { bg: '#e8f0f8', color: '#1A4A6B', border: '#90b8d8' },
    holiday:   { bg: '#eaf4ec', color: '#2A6030', border: '#90c898' },
    army:      { bg: '#eaedda', color: '#3D4E1A', border: '#8A9A50' },
    mivhan:    { bg: '#e4f5f2', color: '#1A7A6A', border: '#80c4b8' },
    gdna:      { bg: '#fdf5d8', color: '#7A5000', border: '#e0c050' },
    special:   { bg: '#fdf0e0', color: '#7A3000', border: '#e0b070' },
  };

  function buildMonthCalendar(year, month) {
    const wrap = document.createElement('div');
    wrap.className = 'month-grid-wrap';

    const title = document.createElement('div');
    title.className = 'month-grid-title';
    title.textContent = `${monthNames[month]} ${year}`;
    wrap.appendChild(title);

    // שורת שמות ימים
    const nameRow = document.createElement('div');
    nameRow.className = 'cal-grid';
    dayNames.forEach(d => {
      const cell = document.createElement('div');
      cell.className = 'cal-day-name';
      cell.textContent = d;
      nameRow.appendChild(cell);
    });
    wrap.appendChild(nameRow);

    const firstDow   = new Date(year, month, 1).getDay(); // 0=Sun
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    const grid = document.createElement('div');
    grid.className = 'cal-grid';

    // תאים ריקים לפני תחילת החודש
    for (let i = 0; i < firstDow; i++) {
      const empty = document.createElement('div');
      empty.className = 'cal-cell empty';
      grid.appendChild(empty);
    }

    for (let day = 1; day <= daysInMonth; day++) {
      const cell     = document.createElement('div');
      const dateKey  = `${year}${String(month + 1).padStart(2,'0')}${String(day).padStart(2,'0')}`;
      const cellDate = new Date(year, month, day);
      const isWip    = cellDate > CUTOFF;
      const evs      = eventMap[dateKey] || [];

      cell.className = 'cal-cell' + (isWip ? ' wip' : '') + (evs.length ? ' has-event' : '');

      const num = document.createElement('span');
      num.className = 'cal-day-num';
      num.textContent = day;
      cell.appendChild(num);

      if (isWip) {
        const wip = document.createElement('span');
        wip.className = 'cal-wip-label';
        wip.textContent = '🚧 בבנייה';
        cell.appendChild(wip);
      } else {
        evs.forEach(ev => {
          const label = document.createElement('span');
          label.className = 'cal-event-label';
          const c = catColors[ev.cat] || catColors.metakonet;
          label.style.background = c.bg;
          label.style.color      = c.color;
          label.style.border     = `1px solid ${c.border}`;
          label.textContent      = ev.title;
          label.title            = ev.title;
          cell.appendChild(label);
        });
      }

      grid.appendChild(cell);
    }

    wrap.appendChild(grid);
    return wrap;
  }

  const calView = document.getElementById('calendar-view');
  [[2026,3],[2026,4],[2026,5]].forEach(([y,m]) => {
    calView.appendChild(buildMonthCalendar(y, m));
  });

  /* ===== מעבר בין תצוגות ===== */
  function setView(view) {
    const evView  = document.getElementById('events-view');
    const calDiv  = document.getElementById('calendar-view');
    const legend  = document.querySelector('.legend');
    const btnEv   = document.getElementById('btn-events');
    const btnCal  = document.getElementById('btn-calendar');

    if (view === 'events') {
      evView.style.display  = '';
      calDiv.style.display  = 'none';
      legend.style.display  = '';
      btnEv.classList.add('active');
      btnCal.classList.remove('active');
    } else {
      evView.style.display  = 'none';
      calDiv.style.display  = '';
      legend.style.display  = 'none';
      btnEv.classList.remove('active');
      btnCal.classList.add('active');
    }
  }
</script>

</body>
